<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工事工程表 Pro - 全期間表示版</title>
    
    <link rel="stylesheet" href="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <div class="header-panel">
            <div class="input-row">
                <button class="btn-add" id="new_project_btn" onclick="toggleNewProjectForm()" disabled>新規受注</button>
                <button id="kanryo-btn" class="btn-add" onclick="openKanryoModal('kanri')" disabled style="margin-left:4px;">完了済み</button>
                <span id="mark-legend" style="display:flex; align-items:center; gap:4px; font-size: 13px; font-weight: bold; color: #333;">
                    <span>🚚</span> 部品送り開始日
                    <span style="margin-left: 10px; color: #d32f2f; font-size: 20px;">●</span> 外観検査
                    <span style="margin-left: 10px; color: #FBAD4F; font-size: 22px;">▲</span> 客先立会
                    <span style="margin-left: 10px; color: #1976D2; font-size: 20px;">◆</span> 出荷確認会議
                    <span style="margin-left: 10px; color: #2E7D32; font-size: 22px;">★</span> 工場出荷
                </span>
                <span style="margin-left:auto; display:flex; align-items:center; gap:4px;">
                    <span id="save-status" style="font-size:10px; color:#999;"></span>
                    <button id="help_btn" onclick="openHelp()" title="使い方ガイド">？</button>
                    <button id="auth_btn" onclick="handleAuthBtn()" style="margin-left:4px;">ログイン</button>
                </span>
            </div>
            <div class="input-row" style="border-top: 1px solid #eee;">
                <button id="reset_filter_btn" class="zoom-btn" style="font-size: 12px; background-color:#e67e22; border-color:#d35400; color:#fff; font-weight:bold; margin-right:10px;" onclick="resetFilter()">表示リセット</button>
                <span style="font-size: 13px;">表示順：</span>
                <button id="sort_process_btn" class="zoom-btn active" onclick="setDisplayMode('process')">工程別</button>
                <button id="sort_machine_btn" class="zoom-btn" onclick="setDisplayMode('machine')">機械別</button>
                <div style="display:flex; align-items:center; gap:6px; margin-left:16px;">
                    <span style="font-size: 13px;">表示切替:</span>
                    <button id="zoom_days_btn" class="zoom-btn active" style="font-size: 12px;" onclick="setZoom('days')">日単位</button>
                    <button id="zoom_weeks_btn" class="zoom-btn" style="font-size: 12px;" onclick="setZoom('weeks')">週単位</button>
                    <button id="scroll_today_btn" class="zoom-btn" onclick="scrollToToday()" style="background-color: #ebf5ff; border-color: #3498db; color: #3498db; font-size: 12px;">今日へ移動</button>
                </div>
                <div style="margin-left:auto; display:flex; align-items:center; gap:6px;">
                    <span id="filter_status" style="font-weight:bold; color:#3498db; font-size: 12px; display:none;"></span>
                </div>
            </div>
        </div>

        <div class="toolbar">
            <div class="filter-group" style="margin-left: 0; padding-left: 0; border-left: none;">
                <button id="search-filter-toggle" class="zoom-btn" onclick="toggleSearchFilterPanel()" style="font-size:13px; display:flex; align-items:center; gap:3px;"><svg width="13" height="13" viewBox="0 0 14 14" style="display:block;"><path d="M1 2 Q1 1 2 1 L12 1 Q13 1 13 2 Q13 2.5 11 5 L9 7.5 L9 12 Q9 13 8 12.5 L6 11.5 Q5 11 5 10 L5 7.5 L3 5 Q1 2.5 1 2 Z" fill="currentColor" opacity="0.85"/><rect x="3.5" y="2.5" width="7" height="1.2" rx="0.6" fill="white" opacity="0.5"/></svg> 検索</button>
            </div>

            <div class="filter-group" style="align-items:center;">
                <label style="font-size:13px; white-space:nowrap;">部署別フィルタ</label>
                <select id="major-filter-select" onchange="filterByMajorItem(this.value)" style="font-size:12px; padding:2px 4px; border:1px solid #ccc; border-radius:3px; margin-left:4px;">
                    <option value="">全部署</option>
                    <option value="営業">営業</option>
                    <option value="設計">設計</option>
                    <option value="製管">製管</option>
                    <option value="組立">組立</option>
                    <option value="電装">電装</option>
                    <option value="品証">品証</option>
                    <option value="操業">操業</option>
                    <option value="電技">電技</option>
                    <option value="明石">明石</option>
                </select>
            </div>

            <div class="filter-group" style="align-items:center;">
                <label style="font-size:13px; white-space:nowrap;">部署別リソース</label>
                <select id="resource-dept-select" onchange="filterByDepartmentSelect(this.value)" style="font-size:12px; padding:2px 4px; border:1px solid #ccc; border-radius:3px; margin-left:4px;">
                    <option value="">-</option>
                    <option value="営業">営業</option>
                    <option value="設計">設計</option>
                    <option value="製管">製管</option>
                    <option value="組立">組立</option>
                    <option value="電装">電装</option>
                    <option value="品証">品証</option>
                    <option value="操業">操業</option>
                    <option value="電技">電技</option>
                    <option value="明石">明石</option>
                </select>
            </div>

            <div class="filter-group">
                <button class="zoom-btn resource-location-btn" id="location_resource_btn" onclick="toggleLocationResource(this)">組立場所</button>
                <button id="sort_business_trip_btn" class="zoom-btn" onclick="handleBusinessTripBtn()" style="margin-left: 4px;">出張予定</button>
            </div>
        </div>

        <div class="content-area">
            <div class="sidebar">
                <div class="sidebar-title">
                    <span onclick="resetFilter()" title="クリックして全表示にリセット" style="cursor:pointer; flex:1;">工事一覧</span>
                    <button id="project-group-filter-btn" class="project-group-filter-btn" onclick="toggleProjectGroupDropdown(event)" title="工事番号フィルター">▼</button>
                </div>
                <div id="project-group-dropdown" class="project-group-dropdown">
                    <div class="project-group-dropdown-item active" onclick="setProjectGroupFilter('all', this)">すべて</div>
                    <div class="project-group-dropdown-item" onclick="setProjectGroupFilter('2000', this)">2000番台</div>
                    <div class="project-group-dropdown-item" onclick="setProjectGroupFilter('other', this)">その他</div>
                </div>
                <div id="project_list" class="project-list"></div>
            </div>
            <div class="chart-container">
                <!-- メインガントチャート -->
                <div id="gantt_here" style="width: 100%; flex: 1; min-height: 0;"></div>

                <!-- 独立したリソースパネル -->
                <div id="resource_panel" style="display: none; height: 250px; border-top: 2px solid #ccc; background: #fff; flex-direction: column; position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;">
                    <div id="resource_resizer" style="height: 5px; cursor: ns-resize; background: #eee; width: 100%; position: absolute; top: -3px; z-index: 100; transition: background 0.2s;" onmouseover="this.style.background='#3498db'" onmouseout="this.style.background='#eee'"></div>
                    <div id="resource_header_bar" class="resource-header-bar" style="display: none;">
                        <span id="resource_title">リソース状況（担当者で選択）</span>
                        <button type="button" class="resource-header-close" id="resource_close_btn" title="リソース画面を閉じる" aria-label="閉じる">×</button>
                    </div>

                    <div class="resource-content" style="flex: 1; overflow: auto;">
                        <div id="resource_content_inner" class="resource-content-inner">
                            <!-- ここにJSでHTMLが挿入される -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <!-- 完了済工番モーダル -->
    <!-- ===== 検索フィルターポップアップ ===== -->
    <div id="search-filter-popup" style="position:fixed; display:none; background:#fff; border-radius:6px; box-shadow:0 4px 16px rgba(0,0,0,0.2); border:1px solid #ddd; z-index:10000; padding:12px 14px; min-width:200px;">
        <div style="font-size:12px; font-weight:bold; color:#555; margin-bottom:8px; border-bottom:1px solid #eee; padding-bottom:6px;">検索フィルター</div>
        <div style="display:flex; flex-direction:column; gap:8px;">
            <div>
                <label style="font-size:11px; color:#777; display:block; margin-bottom:2px;">機械検索</label>
                <input type="text" id="machine_search" placeholder="機械名を入力..." style="width:100%; padding:3px 6px; border:1px solid #ccc; border-radius:3px; font-size:12px; box-sizing:border-box;" oninput="filterByMachine(this.value)">
            </div>
            <div>
                <label style="font-size:11px; color:#777; display:block; margin-bottom:2px;">タスク検索</label>
                <input type="text" id="task_search" placeholder="タスク名を入力..." style="width:100%; padding:3px 6px; border:1px solid #ccc; border-radius:3px; font-size:12px; box-sizing:border-box;" oninput="filterByTaskName(this.value)">
            </div>
            <div>
                <label style="font-size:11px; color:#777; display:block; margin-bottom:2px;">担当検索</label>
                <input type="text" id="owner_search" placeholder="名前を入力..." autocomplete="off" style="width:100%; padding:3px 6px; border:1px solid #ccc; border-radius:3px; font-size:12px; box-sizing:border-box;" oninput="if(!this.value.includes('@'))filterByOwner(this.value)">
                <button id="unassigned_filter_btn" class="filter-btn" onclick="toggleUnassignedFilter()" style="margin-top:5px; font-size:12px; width:100%;">⚠️ 担当未定</button>
            </div>
        </div>
    </div>

    <!-- ===== 新規受注モーダル ===== -->
    <div id="new-project-modal-overlay" onclick="closeNewProjectModal(event)">
        <div id="new-project-modal">
            <div id="new-project-modal-header">
                <span>新規受注</span>
                <button onclick="closeNewProjectModal()" style="background:none; border:none; color:#fff; font-size:16px; cursor:pointer; line-height:1;">✕</button>
            </div>
            <div id="new-project-modal-body">
                <div>
                    <label>工事番号</label>
                    <input type="text" id="project_number" placeholder="例: 3001">
                </div>
                <div>
                    <label>客先名</label>
                    <input type="text" id="customer_name_input" placeholder="客先名">
                </div>
                <div>
                    <label>工事名</label>
                    <input type="text" id="project_details_input" placeholder="工事名">
                </div>
                <div>
                    <label>受注日</label>
                    <input type="date" id="order_date">
                </div>
                <div>
                    <label>出荷日</label>
                    <input type="date" id="shipping_date">
                </div>
            </div>
            <div id="new-project-modal-footer">
                <button onclick="closeNewProjectModal()" style="padding:5px 14px; border:1px solid #ccc; border-radius:4px; cursor:pointer; font-size:12px; background:#fff;">キャンセル</button>
                <button class="btn-add" onclick="addProjectFromTemplate()">追加</button>
            </div>
        </div>
    </div>

    <div id="kanryo-modal-overlay" onclick="closeKanryoModal(event)">
        <div id="kanryo-modal">
            <div id="kanryo-modal-header">
                <span>完了済み工事番号</span>
                <button id="kanryo-close-btn" onclick="closeKanryoModal()">✕</button>
            </div>
            <div id="kanryo-modal-tabs">
                <div class="kanryo-tab active" id="kanryo-tab-kanri" onclick="switchKanryoTab('kanri')">管理</div>
                <div class="kanryo-tab" id="kanryo-tab-ichiran" onclick="switchKanryoTab('ichiran')">一覧</div>
            </div>
            <div id="kanryo-modal-body"></div>
        </div>
    </div>

<!-- ===== パスワード設定ダイアログ ===== -->
<div id="setpw_overlay">
    <div id="setpw_dialog">
        <h2>パスワードを設定してください</h2>
        <p>初回ログイン用パスワードを設定します</p>
        <input type="password" id="setpw_pw1" placeholder="新しいパスワード（8文字以上）">
        <input type="password" id="setpw_pw2" placeholder="パスワードを再入力"
               onkeydown="if(event.key==='Enter') doSetPassword()">
        <div id="setpw_error"></div>
        <button id="setpw_btn_submit" onclick="doSetPassword()">パスワードを設定する</button>
    </div>
</div>

<!-- ===== ログインダイアログ ===== -->
<div id="login_overlay">
    <div id="login_dialog">
        <h2>工事工程表 ログイン</h2>
        <input type="email" id="login_email" placeholder="メールアドレス" autocomplete="email">
        <input type="password" id="login_password" placeholder="パスワード" autocomplete="current-password"
               onkeydown="if(event.key==='Enter') doLogin()">
        <div id="login_error"></div>
        <button id="login_btn_submit" onclick="doLogin()">ログイン</button>
        <button id="login_btn_cancel" onclick="closeLoginDialog()">キャンセル</button>
    </div>
</div>

<!-- ヘルプモード コンテナ -->
<div id="help_tips_container"></div>

    <script src="gantt-setup.js"></script>
    <script src="gantt-events.js"></script>
    <script src="gantt-resource.js"></script>
    <script src="gantt-app.js"></script>
    <script src="gantt-ui.js"></script>
</body>
</html>
