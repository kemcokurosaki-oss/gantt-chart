        // リソース画面の描画処理
        function renderResourceTimeline() {
            const container = document.getElementById("resource_content_inner");
            if (!container) return;

            if (!currentResourceOwnerFilter && !currentResourceDeptFilter) {
                container.innerHTML = '<div class="resource-placeholder">担当者または部署を選択してリソース状況を表示</div>';
                return;
            }

            // window.allTasks からフィルタリング
            const filteredTasks = (window.allTasks || []).filter(t => {
                // is_detailed が true のタスクは除外
                const isDetailed = (t.is_detailed === true || String(t.is_detailed).toLowerCase() === "true" || String(t.is_detailed).toLowerCase() === "t" || String(t.is_detailed) === "1");
                if (isDetailed) return false;

                let isMatch = false;
                let currentDept = currentResourceDeptFilter || lastDeptName;

                if (currentResourceDeptFilter) {
                    isMatch = t.major_item === currentResourceDeptFilter;
                } else {
                    // 名寄せ後の名前に基づいてフィルタリング
                    const normalizedOwners = getNormalizedOwners(t.owner).map(o => o.toLowerCase());
                    const searchOwner = currentResourceOwnerFilter.toLowerCase();
                    
                    // 「外注」で検索された場合は、そのタスクの major_item が最後に選択された部署 (lastDeptName) と一致する必要がある
                    if (searchOwner === "外注") {
                        isMatch = normalizedOwners.includes("外注") && (t.major_item === lastDeptName);
                    } else {
                        isMatch = normalizedOwners.includes(searchOwner);
                    }
                }

                if (!isMatch) return false;

                // 組立リソースの場合、タスク名または親（parent/parent_name）に出荷が含まれるタスクは表示しない。
                // ただし、担当者別詳細画面（currentResourceDeptFilterが空）の場合は表示する。
                const isShipping = (t.text && t.text.includes('出荷')) || 
                                   (t.parent === '出荷' || t.parent === '出荷準備') || 
                                   (t.parent_name && (t.parent_name.includes('出荷') || t.parent_name.includes('出荷準備')));
                if (currentResourceDeptFilter && currentDept === '組立' && isShipping) return false;

                return true;
            });

            if (filteredTasks.length === 0) {
                container.innerHTML = `<div class="resource-placeholder">該当する${currentResourceDeptFilter ? '部署' : '担当者'}のタスクはありません</div>`;
                return;
            }

            // 工事番号の優先度計算
            const getPriority = (p) => {
                if (!p) return 5;
                if (p.startsWith('2')) return 1;
                if (p.startsWith('3')) return 2;
                if (p.startsWith('4')) return 3;
                if (p.startsWith('D')) return 4;
                return 5;
            };

            // 上段の工程表と同じ条件でソート
            filteredTasks.sort((a, b) => {
                const pNumA = a.project_number || "";
                const pNumB = b.project_number || "";
                const priA = getPriority(pNumA);
                const priB = getPriority(pNumB);
                if (priA !== priB) return priA - priB;
                return pNumA.localeCompare(pNumB, undefined, { numeric: true, sensitivity: 'base' });
            });

            const scale = gantt.getScale();
            const timelineWidth = scale.full_width;
            const columnWidth = scale.col_width;
            const totalWidth = GRID_WIDTH + timelineWidth;

            // 背景の目盛り線の開始位置を計算（週表示などでズレを防ぐ）
            const firstDate = scale.trace_x[0];
            const firstPos = gantt.posFromDate(firstDate);
            
            // 背景のグリッド線（縦・横）を生成
            const gridBackground = `repeating-linear-gradient(to right, transparent, transparent ${columnWidth - 1}px, #ebebeb ${columnWidth - 1}px, #ebebeb ${columnWidth}px), repeating-linear-gradient(to bottom, transparent, transparent 26px, #ebebeb 26px, #ebebeb 27px)`;
            
            // 土日の背景色を個別のdivとして生成するためのHTML
            let weekendBackgroundHtml = "";
            const currentZoom = (gantt.ext.zoom.getCurrentLevel() || "days");
            if (currentZoom === "days") {
                scale.trace_x.forEach((date, i) => {
                    const isWeekend = date.getDay() === 0 || date.getDay() === 6;
                    const ds = date.getFullYear() + "-" + String(date.getMonth()+1).padStart(2,"0") + "-" + String(date.getDate()).padStart(2,"0");
                    if (isWeekend || holidaySet.has(ds)) {
                        weekendBackgroundHtml += `<div style="position: absolute; top: 0; bottom: 0; left: ${i * columnWidth}px; width: ${columnWidth}px; background: #f4f4f4; z-index: 0;"></div>`;
                    }
                });
            }
            
            // background-position を調整してメイン画面のグリッド線と同期
            const backgroundStyle = `background-image: ${gridBackground}; background-position: ${-firstPos}px 0; background-size: ${columnWidth}px 27px; height: 100%;`;

            // 今日の日付線の位置計算
            const todayPos = gantt.posFromDate(new Date());
            const todayLineHtml = `<div class="resource-today-line" style="left: ${todayPos}px;"></div>`;

            let html = "";
            
            // 担当者名とタスク件数を表示する固定ヘッダー行
            const filterTitle = currentResourceDeptFilter ? `部署：${currentResourceDeptFilter}` : `担当：${currentResourceOwnerFilter}`;
            const viewClass = currentResourceDeptFilter ? "resource-dept-view" : "resource-owner-view";

            // タスクの重なりを判定してスタック位置を計算
            const sortedTasks = filteredTasks.sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
            const stacks = []; // 各スタックの終了時間を保持

            const backBtnHtml = (!currentResourceDeptFilter && lastDeptName)
                ? `<button type="button" onclick="backToDeptResource()" style="margin-left: auto; padding: 1px 8px; font-size: 11px; cursor: pointer; border: 1px solid #aaa; border-radius: 3px; background: #fff; white-space: nowrap;">◀ 部署別に戻る</button>`
                : "";

            html += `
                <div class="resource-item resource-summary-header ${viewClass}" style="display: flex; border-bottom: 1px solid #ddd; min-height: 27px; height: 27px; align-items: center; background: #f8f9fa; position: sticky; top: 0; left: 0; z-index: 10; width: ${totalWidth}px;">
                    <div style="width: ${GRID_WIDTH}px; flex-shrink: 0; position: sticky; left: 0; background: inherit; height: 100%; display: flex; align-items: center; padding: 0 8px; z-index: 11;">
                        <span style="font-weight: bold; color: #2c3e50; font-size: 11px; white-space: nowrap;">【${filterTitle}】のタスク　${filteredTasks.length}件</span>
                        ${backBtnHtml}
                    </div>
                    <div style="position: sticky; right: 0; background: inherit; height: 100%; display: flex; align-items: center; padding-right: 10px; margin-left: auto; z-index: 11;">
                        <button type="button" class="resource-header-close" onclick="closeResourcePanel()">×</button>
                    </div>
                </div>
            `;
            
            sortedTasks.forEach(t => {
                const start = new Date(t.start_date);
                const end = gantt.calculateEndDate(start, t.duration);
                
                const left = gantt.posFromDate(start);
                const right = gantt.posFromDate(end);
                const width = Math.max(2, right - left);
                
                const colorClass = getResourceTaskClass(t);
                const title = `${t.text} (${t.project_number})`;

                // 部署別表示の場合のみスタックとコンフリクト判定を行う
                let topOffset = 3;
                let barHeight = 21;
                let conflictClass = "";
                
                // 担当者別詳細画面ではスタック（段積み）を行わず、常に中央（top: 3px）に配置する
                // これによりメイン工程表と全く同じ見た目（27px行、21pxバー、上下3px余白）を実現する
                topOffset = 3;
                barHeight = 21;

                if (currentResourceDeptFilter) {
                    // 部署別表示の場合のみ重なりがあるかの判定を行い、赤斜線クラスを付与
                    // また、部署別表示の場合のみスタック位置を計算する
                    const stacks = []; // 部署別表示用のローカルスタック
                    let stackIndex = 0;
                    const deptSortedTasks = filteredTasks.sort((a, b) => new Date(a.start_date) - new Date(b.start_date));
                    
                    // 現在のタスクまでのスタック位置を特定
                    for (let i = 0; i < deptSortedTasks.length; i++) {
                        const dt = deptSortedTasks[i];
                        const dtStart = new Date(dt.start_date);
                        const dtEnd = gantt.calculateEndDate(dtStart, dt.duration);
                        
                        let sIdx = 0;
                        while (stacks[sIdx] && stacks[sIdx] > dtStart.getTime()) {
                            sIdx++;
                        }
                        stacks[sIdx] = dtEnd.getTime();
                        
                        if (dt.id === t.id) {
                            stackIndex = sIdx;
                            break;
                        }
                    }
                    
                    topOffset = 3 + (stackIndex * 5);

                    const isOverlapping = filteredTasks.some(other => {
                        if (other.id === t.id) return false;
                        const oStart = new Date(other.start_date);
                        const oEnd = gantt.calculateEndDate(oStart, other.duration);
                        return (start < oEnd && end > oStart);
                    });
                    if (isOverlapping) {
                        conflictClass = ""; // 背景セルに表示するため、バー自体の赤斜線クラスは付与しない
                    }
                }

                const zIndex = 5 + (currentResourceDeptFilter ? 1 : 0); // 部署別表示時のみスタック順を考慮可能

                // この担当者の行内で重なりがある日付（セル）を特定して赤斜線背景を生成
                let rowConflictBackgroundHtml = "";
                if (currentResourceDeptFilter) {
                    scale.trace_x.forEach((date, i) => {
                        const cellStart = date;
                        const cellEnd = gantt.date.add(cellStart, 1, scale.unit);
                        
                        let hasConflictInCell = false;
                        for (let idx1 = 0; idx1 < filteredTasks.length; idx1++) {
                            const t1 = filteredTasks[idx1];
                            const s1 = new Date(t1.start_date);
                            const e1 = gantt.calculateEndDate(s1, t1.duration);
                            if (!(s1 < cellEnd && e1 > cellStart)) continue;
                            
                            for (let idx2 = idx1 + 1; idx2 < filteredTasks.length; idx2++) {
                                const t2 = filteredTasks[idx2];
                                const s2 = new Date(t2.start_date);
                                const e2 = gantt.calculateEndDate(s2, t2.duration);
                                if (!(s2 < cellEnd && e2 > cellStart)) continue;
                                
                                if (s1 < e2 && e1 > s2) {
                                    hasConflictInCell = true;
                                    break;
                                }
                            }
                            if (hasConflictInCell) break;
                        }
                        
                        if (hasConflictInCell) {
                            rowConflictBackgroundHtml += `<div class="resource-cell-conflict-bg" style="position: absolute; top: 0; bottom: 0; left: ${i * columnWidth}px; width: ${columnWidth}px; z-index: 1;"></div>`;
                        }
                    });
                }

            // 4. 【グリッド幅の固定】
            html += `
                <div class="resource-item ${viewClass}" style="display: flex; border-bottom: 1px solid #eee; min-height: 27px; height: 27px; align-items: stretch; box-sizing: border-box;">
                    <div class="resource-grid-container" style="width: ${GRID_WIDTH}px; min-width: ${GRID_WIDTH}px; flex-shrink: 0; display: flex; border-right: 1px solid #ddd; background: #fff; position: sticky; left: 0; z-index: 1;">
                        <div class="resource-cell" style="width: ${COLUMN_WIDTHS[0]}px; border-right: 1px solid #eee; padding: 0 4px; display: flex; align-items: center; justify-content: center; font-size: 14px;"></div>
                        <div class="resource-cell" style="width: ${COLUMN_WIDTHS[1]}px; border-right: 1px solid #eee; padding: 0 4px; display: flex; align-items: center; justify-content: center; font-size: 14px;">${t.project_number || ""}</div>
                        <div class="resource-cell" style="width: ${COLUMN_WIDTHS[2]}px; border-right: 1px solid #eee; padding: 0 4px; display: flex; align-items: center; font-size: 14px;"></div>
                        <div class="resource-cell" style="width: ${COLUMN_WIDTHS[3]}px; border-right: 1px solid #eee; padding: 0 4px; display: flex; align-items: center; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${t.text || ""}</div>
                        <div class="resource-cell" style="width: ${COLUMN_WIDTHS[4]}px; border-right: 1px solid #eee; padding: 0 4px; display: flex; align-items: center; justify-content: center; font-size: 14px;">${t.machine || ""}</div>
                        <div class="resource-cell" style="width: ${COLUMN_WIDTHS[5]}px; border-right: 1px solid #eee; padding: 0 4px; display: flex; align-items: center; justify-content: center; font-size: 14px;">${t.unit || ""}</div>
                        <div class="resource-cell" style="width: ${COLUMN_WIDTHS[6]}px; border-right: 1px solid #eee; padding: 0 4px; display: flex; align-items: center; font-size: 13px;">${(t.owner || "").replace(/\d+/g, "")}</div>
                        <div class="resource-cell" style="width: ${COLUMN_WIDTHS[7]}px; border-right: 1px solid #eee; padding: 0 4px; display: flex; align-items: center; justify-content: center; font-size: 14px;">${t.area_group || ""}${t.area_number ? "-" + t.area_number : ""}</div>
                        <div class="resource-cell" style="width: ${COLUMN_WIDTHS[8]}px; border-right: 1px solid #eee; padding: 0 4px; display: flex; align-items: center; justify-content: center; font-size: 14px;">${dateToDisplay(start)}</div>
                        <div class="resource-cell" style="width: ${COLUMN_WIDTHS[9]}px; border-right: 1px solid #eee; padding: 0 4px; display: flex; align-items: center; justify-content: center; font-size: 14px;">${dateToDisplay(end)}</div>
                        <div class="resource-cell" style="width: ${COLUMN_WIDTHS[10]}px; padding: 0 4px;"></div>
                    </div>
                        <div class="resource-timeline" style="width: ${timelineWidth}px; flex-shrink: 0; position: relative; background: #fff; border-right: 1px solid #ebebeb; box-sizing: border-box;">
                            <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 0;">${weekendBackgroundHtml}</div>
                            <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; ${backgroundStyle} z-index: 1;"></div>
                            <div style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1;">${rowConflictBackgroundHtml}</div>
                            ${todayLineHtml}
                            <div class="resource-cell-bars" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 2;">
                                <div class="resource-cell-bar ${colorClass} ${conflictClass}" 
                                     style="position: absolute; top: ${topOffset}px; height: ${barHeight}px; left: ${left}px; width: ${width}px; border-radius: 3px; opacity: 0.8; display: flex; align-items: center; justify-content: center; color: #222; font-size: 13px; font-weight: bold; overflow: hidden; white-space: nowrap; text-shadow: none; z-index: ${zIndex}; box-sizing: border-box; border: 1px solid rgba(0,0,0,0.15);" 
                                     title="${title.replace(/"/g, "&quot;")}">
                                     <span class="resource-bar-text">${t.project_number || ""} ${t.machine || ""} ${t.unit || ""}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            syncResourceScroll();
        }

        // 2. 【スクロールの同期】
        function updateStickyBarText(scrollLeft) {
            const sl = scrollLeft !== undefined ? scrollLeft : (gantt.getScrollState().x || 0);
            const gridEl = document.querySelector('.gantt_grid');
            if (!gridEl) return;
            const boundary = gridEl.getBoundingClientRect().right;

            document.querySelectorAll('.gantt_task_line').forEach(bar => {
                const textEl = bar.querySelector('.task-name-text');
                if (!textEl) return;
                const barLeft  = parseFloat(bar.style.left)  || 0;
                const barWidth = parseFloat(bar.style.width) || 0;

                // バーが完全に左へ消えたらリセット
                if (sl >= barLeft + barWidth) {
                    textEl.style.transform = '';
                    return;
                }

                // transform をリセットして自然な位置のテキスト左端を実測
                textEl.style.transform = '';
                const textLeft = textEl.getBoundingClientRect().left;

                // テキスト左端が境界線にぶつかった分だけずらす
                const offset = Math.max(0, boundary - textLeft);
                if (offset > 0) textEl.style.transform = `translateX(${offset}px)`;
            });
        }

        gantt.attachEvent("onGanttScroll", function (left, top){
            const resourceContent = document.querySelector(".resource-content");
            if (resourceContent) {
                resourceContent.scrollLeft = left;
            }
            updateStickyBarText(left);
        });

        // 3. 【ズーム切り替え時の再描画】
        function setZoom(level) {
            // スクロール位置を保存
            const scrollState = gantt.getScrollState();

            // ボタンのアクティブ状態を切り替え
            document.getElementById('zoom_days_btn').classList.toggle('active', level === 'days');
            document.getElementById('zoom_weeks_btn').classList.toggle('active', level === 'weeks');

            gantt.ext.zoom.setLevel(level); 

            // ズームレベルに応じてコンテナにクラスを付与（CSSでの制御用）
            const container = document.getElementById("gantt_here");
            if (level === "days") {
                container.classList.add("zoom-days");
            } else {
                container.classList.remove("zoom-days");
            }

            gantt.config.start_date = new Date(GANTT_START_DATE.getTime());
            gantt.config.end_date = new Date(GANTT_END_DATE.getTime());
            gantt.config.fit_tasks = false;
            gantt.render();
            
            // スクロール位置を復元
            gantt.scrollTo(scrollState.x, scrollState.y);

            if (currentLocationResourceMode) {
                renderLocationResourceTimeline();
            } else if (currentResourceMode === 'dept' && lastDeptName) {
                filterByDepartment(lastDeptName);
            } else {
                const owner = document.getElementById("resource_owner_input")?.value || lastOwnerName;
                if (owner) showResourceViewByOwner(owner);
            }
        }

        function syncResourceScroll() {
            const ganttScroll = gantt.getScrollState();
            const resourceContent = document.querySelector(".resource-content");
            if (resourceContent) {
                resourceContent.scrollLeft = ganttScroll.x;
                // グリッド幅分だけクリップ位置を調整（もし必要なら）
                resourceContent.style.setProperty('--resource-clip-left', '0px');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            // 担当検索欄・リソース担当検索欄の自動入力を監視してクリア
            const ownerSearch = document.getElementById('owner_search');
            const resourceOwnerInput = document.getElementById('resource_owner_input');
            [ownerSearch, resourceOwnerInput].forEach(el => {
                if (!el) return;
                const clear = () => {
                    if (el.value.includes('@') || el.value.includes('.com') || el.value.includes('.jp')) {
                        el.value = '';
                    }
                };
                el.addEventListener('input', clear);
                el.addEventListener('change', clear);
            });

            setTimeout(() => {
                const resourceContent = document.querySelector(".resource-content");
                if (resourceContent) {
                    resourceContent.addEventListener('scroll', function() {
                        // リソース側のスクロールをガント側に同期
                        // ただし、無限ループを防ぐために現在の位置と異なる場合のみ実行
                        const ganttScroll = gantt.getScrollState();
                        if (Math.abs(ganttScroll.x - this.scrollLeft) > 1) {
                            gantt.scrollTo(this.scrollLeft, null);
                        }
                    });
                }
            }, 1000);
        });

        // ========== 組立場所リソース バーカラーピッカー ==========
        function isDarkColor(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            // 相対輝度（知覚的な明るさ）で判定
            return (r * 299 + g * 587 + b * 114) / 1000 < 128;
        }

        const LOC_BAR_COLORS = [
            '#EF5350', // 赤
            '#FF9800', // オレンジ
            '#FFEE58', // 黄
            '#8BC34A', // 黄緑
            '#26A69A', // ティール
            '#42A5F5', // 青
            '#7E57C2', // 紫
            '#EC407A', // ピンク
            '#78909C', // グレーブルー
            '#A1887F', // ブラウン
            '#66BB6A', // 緑
            '#9FA8DA', // ラベンダー
            '#80DEEA', // 水色
            '#FFAB91', // サーモン
            '#FFD54F', // 琥珀
        ];

        function getOrCreateLocationColorPicker() {
            let picker = document.getElementById('location-bar-color-picker');
            if (!picker) {
                picker = document.createElement('div');
                picker.id = 'location-bar-color-picker';
                LOC_BAR_COLORS.forEach(color => {
                    const swatch = document.createElement('div');
                    swatch.className = 'loc-bar-color-swatch';
                    swatch.style.backgroundColor = color;
                    swatch.dataset.color = color;
                    picker.appendChild(swatch);
                });
                document.body.appendChild(picker);
            }
            return picker;
        }

        let _locBarPickerTarget = null;
        let _locBarPickerHideTimer = null;

        function initLocationBarColorPicker(container) {
            const picker = getOrCreateLocationColorPicker();

            container.querySelectorAll('.resource-cell-bar[data-task-id]').forEach(bar => {
                bar.addEventListener('click', e => {
                    e.stopPropagation();
                    if (_locBarPickerTarget === bar && picker.classList.contains('visible')) {
                        picker.classList.remove('visible');
                        _locBarPickerTarget = null;
                        return;
                    }
                    _locBarPickerTarget = bar;
                    const rect = bar.getBoundingClientRect();
                    let top = rect.bottom + 4;
                    let left = e.clientX;
                    if (left + 180 > window.innerWidth) left = window.innerWidth - 185;
                    picker.style.top = top + 'px';
                    picker.style.left = left + 'px';
                    const currentColor = locationBarColors[bar.dataset.taskId] || '';
                    picker.querySelectorAll('.loc-bar-color-swatch').forEach(s => {
                        s.classList.toggle('active', s.dataset.color === currentColor);
                    });
                    picker.classList.add('visible');
                });
            });

            picker.addEventListener('click', e => {
                const swatch = e.target.closest('.loc-bar-color-swatch');
                if (!swatch || !_locBarPickerTarget) return;
                const color = swatch.dataset.color;
                const taskId = _locBarPickerTarget.dataset.taskId;
                locationBarColors[taskId] = color;
                _locBarPickerTarget.style.setProperty('background-color', color, 'important');
                supabaseClient.from('tasks').update({ bar_color: color }).eq('id', taskId)
                    .then(({ error }) => { if (error) console.error("バー色保存エラー:", error); });
                picker.querySelectorAll('.loc-bar-color-swatch').forEach(s => {
                    s.classList.toggle('active', s.dataset.color === color);
                });
                picker.classList.remove('visible');
                _locBarPickerTarget = null;
            });

            // ピッカー外クリックで閉じる
            document.addEventListener('click', () => {
                picker.classList.remove('visible');
                _locBarPickerTarget = null;
            });
        }
        // ========================================================

        function getResourceTaskClass(task) {
            if (task.text === "外観検査") return "milestone-circle";
            if (task.text === "出荷確認会議") return "milestone-diamond";
            if (task.text === "工場出荷") return "milestone-star";
            if (task.text === "客先立会") return "milestone-square";
            switch (task.major_item) {
                case '設計': return "task-blue";
                case '製管': case '品証': return "task-green";
                case '組立': return "task-yellow";
                case '電装': return "task-purple";
                case '操業': return "task-red";
                case '営業': return "task-orange";
                default: return "";
            }
        }

        let _ganttFirstLoad = true;          // 初回ロードフラグ
        const _headerOpenStates = {};        // 見出し行の開閉状態 { taskId: true/false }

        // ユーザー操作 or プログラム呼び出しで開閉が変わったとき即時記録
        gantt.attachEvent("onTaskOpened", function(id) {
            _headerOpenStates[String(id)] = true;
        });
        gantt.attachEvent("onTaskClosed", function(id) {
            _headerOpenStates[String(id)] = false;
        });

        async function loadCompletedProjects() {
            const { data, error } = await supabaseClient.from('completed_projects').select('*');
            if (error) { console.error('[loadCompletedProjects] エラー:', error); return; }
            completedProjects = data || [];
        }

        async function loadHolidays() {
            const { data, error } = await supabaseClient.from('holidays').select('date');
            if (error) {
                console.error('[loadHolidays] エラー:', error);
                return;
            }
            if (data) {
                // "YYYY/M/D" → "YYYY-MM-DD" に正規化してガント側のフォーマットに合わせる
                holidaySet = new Set(data.map(r => {
                    const parts = String(r.date).split('/');
                    if (parts.length === 3) {
                        return parts[0] + '-' + parts[1].padStart(2,'0') + '-' + parts[2].padStart(2,'0');
                    }
                    return String(r.date).substring(0, 10);
                }));
            }
        }

        async function fetchTasks() {
            // スクロール位置を記憶
            const scrollPos = gantt.getScrollState();

            // 表示モードに応じてソート順のカラムを切り替え
            const sortColumn = currentDisplayMode === 'machine' ? 'sort_order_machine' : 'sort_order';
            const { data, error } = await supabaseClient.from('tasks').select('*').order(sortColumn, { ascending: true });
            if (error) return;

            // task_locations データを取得してマッピング
            const { data: locData, error: locError } = await supabaseClient.from('task_locations').select('*');
            const locMap = {};
            if (!locError && locData) {
                locData.forEach(loc => {
                    if (!locMap[loc.task_id]) {
                        locMap[loc.task_id] = { area_group: loc.area_group, area_numbers: [] };
                    }
                    locMap[loc.task_id].area_number = loc.area_number; // 単一の値として保持（既存ロジックに合わせる）
                    if (!locMap[loc.task_id].area_numbers) locMap[loc.task_id].area_numbers = [];
                    locMap[loc.task_id].area_numbers.push(loc.area_number);
                });
            }

            const MILESTONE_TEXTS = ["外観検査", "客先立会", "出荷確認会議", "工場出荷"];

            const rawTasks = data.map(t => {
                let areaGroup = t.area_group;
                let areaNumber = t.area_number;

                if (locMap[t.id]) {
                    areaGroup = locMap[t.id].area_group;
                    areaNumber = locMap[t.id].area_numbers.join(",");
                }

                // マイルストーンタスクは常に1日に固定
                const isMilestone = MILESTONE_TEXTS.includes(t.text);

                return {
                    id: t.id, text: t.text, start_date: t.start_date,
                    duration: isMilestone ? 1 : t.duration, owner: t.owner, project_number: (t.project_number || "").toString().trim(),
                    machine: t.machine, unit: t.unit, major_item: t.major_item,
                    sort_order: t.sort_order,
                    sort_order_machine: t.sort_order_machine,
                    parent_name: (t.parent || "").toString().trim(),
                    customer_name: t.customer_name || "",
                    project_details: t.project_details || "",
                    is_detailed: t.is_detailed,
                    is_business_trip: t.is_business_trip,
                    area_group: areaGroup,
                    area_number: areaNumber,
                    main_owner: t.main_owner || "",
                    is_completed: t.is_completed || false,
                    bar_color: t.bar_color || ''
                    // is_new_task: t.is_new_task // データベースにカラムがない可能性があるため一時的にコメントアウト
                };
            });

            // チェックボックスの状態をDBから復元
            rawTasks.forEach(t => {
                taskCheckboxes[t.id] = t.is_completed || false;
                if (t.bar_color) locationBarColors[t.id] = t.bar_color;
            });

            window.allTasks = rawTasks;

            const parentOrder = ["受注", "基本設計＆計画承認", "長納期品手配", "出図＆部品手配", "電気設計＆電気品手配", "盤製作", "組立全体", "外観検査", "タスクリスト作成", "試運転", "客先立会", "出荷確認会議", "出荷準備", "出荷", "現地工事"];
            const tasksWithHierarchy = [];
            const parentsMap = {};

            const getPriority = (p) => {
                if (p.startsWith('2')) return 1;
                if (p.startsWith('3')) return 2;
                if (p.startsWith('4')) return 3;
                if (p.startsWith('D')) return 4;
                return 5;
            };
            const isPureNumeric = (s) => /^\d+$/.test(s);

            const projects = [...new Set(rawTasks.map(t => t.project_number))]
                .filter(Boolean)
                .sort((a, b) => {
                    const priA = getPriority(a);
                    const priB = getPriority(b);
                    if (priA !== priB) return priA - priB;
                    const numA = isPureNumeric(a);
                    const numB = isPureNumeric(b);
                    if (numA && !numB) return -1;
                    if (!numA && numB) return 1;
                    return a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });
                });

            if (currentDisplayMode === 'machine') {
                projects.forEach(pNum => {
                    if (currentFilter && pNum !== currentFilter) return;
                    if (currentProjectGroupFilter === '2000' && !/^2/.test(pNum)) return;
                    if (currentProjectGroupFilter === 'other' && /^2/.test(pNum)) return;
                    const projectTasks = rawTasks.filter(t => {
                        if (t.project_number !== pNum) return false;
                        const val = t.is_business_trip;
                        return !(val === true || val === 'true' || val === 'TRUE');
                    });
                    const machinesSet = new Set();
                    projectTasks.forEach(t => {
                        const mStr = t.machine || "設定なし";
                        mStr.split(",").forEach(m => {
                            const trimmed = m.trim();
                            if (trimmed) machinesSet.add(trimmed);
                            else machinesSet.add("設定なし");
                        });
                    });
                    const machines = Array.from(machinesSet).sort();
                    
                    machines.forEach(mName => {
                        const tasksInMachine = projectTasks.filter(t => {
                            const mStr = t.machine || "設定なし";
                            const mList = mStr.split(",").map(m => m.trim());
                            return mList.includes(mName) || (mName === "設定なし" && mList.includes(""));
                        });

                        if (tasksInMachine.length > 0) {
                            const parentKey = `p_${pNum}_m_${mName}`;
                            let minStart = null;
                            let maxEnd = null;
                            tasksInMachine.forEach(t => {
                                const start = new Date(t.start_date);
                                const end = gantt.calculateEndDate(start, t.duration);
                                if (!minStart || start < minStart) minStart = start;
                                if (!maxEnd || end > maxEnd) maxEnd = end;
                            });
                            
                            if (!parentsMap[parentKey]) {
                                
                                parentsMap[parentKey] = {
                                    id: parentKey,
                                    text: mName === "設定なし" ? pNum : `${pNum} - ${mName}`,
                                    project_number: pNum,
                                    machine: mName === "設定なし" ? "" : mName,
                                    major_item: "",
                                    customer_name: tasksInMachine[0].customer_name,
                                    project_details: tasksInMachine[0].project_details,
                                    start_date: minStart,
                                    end_date: maxEnd,
                                    open: false,
                                    type: "project",
                                    $virtual: true
                                };
                                tasksWithHierarchy.push(parentsMap[parentKey]);
                            }
                            tasksInMachine.forEach(t => { 
                                // タスクが複数の機械に属する場合、クローンを作成して異なる親を持たせる
                                const taskClone = { ...t };
                                taskClone.id = `${t.id}_${mName}`; // IDをユニークにする
                                taskClone.original_id = t.id; // 元のIDを保持
                                taskClone.parent = parentKey; 
                                tasksWithHierarchy.push(taskClone); 
                            });
                        }
                    });
                });
            } else if (currentDisplayMode === 'business_trip') {
                // 出張予定モード：見出し行を作らず、タスクをそのまま追加する
                projects.forEach(pNum => {
                    if (currentFilter && pNum !== currentFilter) return;
                    const projectTasks = rawTasks.filter(t => {
                        if (t.project_number !== pNum) return false;
                        const val = t.is_business_trip;
                        return val === true || val === 'true' || val === 'TRUE';
                    });

                    projectTasks.forEach(t => { 
                        t.parent = 0; // 親なし（ルート）
                        tasksWithHierarchy.push(t); 
                    });
                });
            } else {
                projects.forEach(pNum => {
                    if (currentFilter && pNum !== currentFilter) return;
                    const projectTasks = rawTasks.filter(t => {
                        if (t.project_number !== pNum) return false;
                        const val = t.is_business_trip;
                        return !(val === true || val === 'true' || val === 'TRUE');
                    });
                    
                    const assignedTaskIds = new Set();
                    const taskByParent = {};
                    parentOrder.forEach(pName => {
                        taskByParent[pName] = projectTasks.filter(t => t.parent_name === pName);
                    });

                    parentOrder.forEach(pName => {
                        const tasksInParent = taskByParent[pName];
                        if (tasksInParent.length > 0) {
                            const parentKey = `p_${pNum}_${pName}`;
                            let minStart = null;
                            let maxEnd = null;

                            if (pName === "基本設計＆計画承認") {
                                // 編集されたタスク（textが空でない、またはdurationがテンプレートと異なるなど）は自動計算しない
                                // ここでは暫定的に、textが空（新規作成直後の状態）の場合のみ自動計算を適用する
                                const isInitialTask = tasksInParent.every(t => !t.text || t.text.trim() === "");
                                
                                if (isInitialTask) {
                                    const orderTasks = taskByParent["受注"];
                                    const drawingTasks = taskByParent["出図＆部品手配"];
    
                                    if (orderTasks && orderTasks.length > 0 && drawingTasks && drawingTasks.length > 0) {
                                        const orderStart = new Date(orderTasks[0].start_date);
                                        minStart = gantt.calculateEndDate(orderStart, orderTasks[0].duration);
                                        maxEnd = new Date(drawingTasks[0].start_date);
                                        const diffTime = maxEnd.getTime() - minStart.getTime();
                                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                                        tasksInParent.forEach(t => {
                                            t.start_date = minStart;
                                            t.duration = diffDays > 0 ? diffDays : 1;
                                        });
                                    }
                                }
                            }

                            if (!minStart || !maxEnd) {
                                tasksInParent.forEach(t => {
                                    assignedTaskIds.add(t.id);
                                    const start = new Date(t.start_date);
                                    const end = gantt.calculateEndDate(start, t.duration);
                                    if (!minStart || start < minStart) minStart = start;
                                    if (!maxEnd || end > maxEnd) maxEnd = end;
                                });
                            } else {
                                tasksInParent.forEach(t => assignedTaskIds.add(t.id));
                            }

                            // 親タスク（見出し行）の日付を子タスクの範囲に合わせる
                            if (parentsMap[parentKey]) {
                                parentsMap[parentKey].start_date = minStart;
                                parentsMap[parentKey].end_date = maxEnd;
                            }

                            if (!parentsMap[parentKey]) {
                                parentsMap[parentKey] = {
                                    id: parentKey,
                                    text: pName,
                                    project_number: pNum,
                                    machine: tasksInParent[0].machine,
                                    major_item: tasksInParent[0].major_item,
                                    customer_name: tasksInParent[0].customer_name,
                                    project_details: tasksInParent[0].project_details,
                                    start_date: minStart,
                                    end_date: maxEnd,
                                    open: false,
                                    type: "project",
                                    $virtual: true
                                };
                                tasksWithHierarchy.push(parentsMap[parentKey]);
                            }
                            tasksInParent.forEach(t => { t.parent = parentKey; tasksWithHierarchy.push(t); });
                        }
                    });

                    const unassignedTasks = projectTasks.filter(t => !assignedTaskIds.has(t.id));
                    if (unassignedTasks.length > 0) {
                        const parentKey = `p_${pNum}_other`;
                        let minStart = null;
                        let maxEnd = null;
                        unassignedTasks.forEach(t => {
                            const start = new Date(t.start_date);
                            const end = gantt.calculateEndDate(start, t.duration);
                            if (!minStart || start < minStart) minStart = start;
                            if (!maxEnd || end > maxEnd) maxEnd = end;
                        });
                        
                        if (!parentsMap[parentKey]) {
                            parentsMap[parentKey] = {
                                id: parentKey,
                                text: "",
                                project_number: pNum,
                                machine: unassignedTasks[0].machine,
                                major_item: "",
                                customer_name: unassignedTasks[0].customer_name,
                                project_details: unassignedTasks[0].project_details,
                                start_date: minStart,
                                end_date: maxEnd,
                                open: false,
                                type: "project",
                                $virtual: true
                            };
                            tasksWithHierarchy.push(parentsMap[parentKey]);
                        }
                        unassignedTasks.forEach(t => { 
                            t.parent = parentKey; 
                            tasksWithHierarchy.push(t); 
                        });
                    }
                });
            }

            updateProjectList(rawTasks);
            gantt.clearAll();
            console.log("Parsing tasks with hierarchy:", tasksWithHierarchy.length);
            gantt.parse({ data: tasksWithHierarchy });
            
            // 今日のマーカーを更新
            if (typeof updateTodayMarker === "function") {
                updateTodayMarker();
            }
            
            // 見出し行（仮想行）の展開／折りたたみ
            gantt.eachTask(function(task) {
                if (!task.$virtual) return;
                const id = String(task.id);
                const pNum = (task.project_number || "").toString();
                const tracked = _headerOpenStates[id]; // undefined=未記録, true=開, false=閉
                if (tracked === true) {
                    gantt.open(task.id);
                } else if (tracked === false) {
                    gantt.close(task.id);
                } else {
                    // 未記録（初回）：すべて閉じる
                    gantt.close(task.id);
                }
            });
            _ganttFirstLoad = false;

            gantt.config.start_date = new Date(GANTT_START_DATE.getTime());
            gantt.config.end_date = new Date(GANTT_END_DATE.getTime());
            gantt.render();
            
            // スクロール位置を復元
            gantt.scrollTo(scrollPos.x, scrollPos.y);
            
            if (currentResourceOwnerFilter || currentResourceDeptFilter || currentLocationResourceMode) {
                updateResourceVisibility();
            }
        }

        function scrollToToday() {
            const pos = gantt.posFromDate(new Date());
            gantt.scrollTo(pos - 200, null);
        }

        // 詳細ボタンクリック時の処理
        window.openDetail = function(id) {
            const task = gantt.getTask(id);
            const projectNo = task.project_number;
            
            if (!projectNo) {
                alert("工事番号が見つかりません");
                return;
            }

            // 設計詳細画面への遷移条件
            // 1. 機械別表示の場合
            // 2. 工程別表示で、見出し名が「出図＆部品手配」または「長納期品手配」の場合
            const isDesignDetail = (currentDisplayMode === 'machine') || (task.text === "出図＆部品手配") || (task.text === "長納期品手配");

            if (isDesignDetail) {
                let url = `https://kemcokurosaki-oss.github.io/design-schedule/?project_no=${encodeURIComponent(projectNo)}`;
                if (task.text === "長納期品手配") {
                    url += `&task_type=long_lead_item`;
                } else if (task.text === "出図＆部品手配") {
                    url += `&task_type=drawing`;
                }
                window.open(url, '_blank');
            } else {
                alert("準備中");
            }
        };

        function resetFilter() { location.reload(); }

        window.toggleTaskCheckbox = function(id, checked) {
            if (!_isEditor) return;
            taskCheckboxes[id] = checked;
            // 子タスク行を即時更新
            const rowNode = gantt.getTaskRowNode(id);
            if (rowNode) {
                if (checked) rowNode.classList.add("task-checked");
                else rowNode.classList.remove("task-checked");
            }
            // 親行（見出し行）の状態を更新
            try {
                const task = gantt.getTask(id);
                if (task && task.parent) {
                    const children = gantt.getChildren(task.parent);
                    const allChecked = children.length > 0 && children.every(cid => taskCheckboxes[cid]);
                    const parentRow = gantt.getTaskRowNode(task.parent);
                    if (parentRow) {
                        if (allChecked) parentRow.classList.add("task-checked");
                        else parentRow.classList.remove("task-checked");
                    }
                }
            } catch(e) {}
            // Supabaseへの保存はバックグラウンドで実行
            supabaseClient.from('tasks').update({ is_completed: checked }).eq('id', id)
                .then(({ error }) => { if (error) console.error("チェックボックス保存エラー:", error); });
        };

            document.querySelectorAll('.project-group-dropdown-item').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('project-group-dropdown').classList.remove('visible');

        function updateProjectList(tasks) {
            const listEl = document.getElementById('project_list');
            const projectInfoMap = {};
            tasks.forEach(t => {
                if (!t.project_number) return;
                if (!projectInfoMap[t.project_number]) {
                    projectInfoMap[t.project_number] = { customer: t.customer_name || "", details: t.project_details || "" };
                } else {
                    if (!projectInfoMap[t.project_number].customer && t.customer_name) projectInfoMap[t.project_number].customer = t.customer_name;
                    if (!projectInfoMap[t.project_number].details && t.project_details) projectInfoMap[t.project_number].details = t.project_details;
                }
            });
            let projects = Object.keys(projectInfoMap).sort();

            // 完了済工番をサイドバーから除外
            const completedNums = new Set(completedProjects.map(cp => cp.project_number));
            projects = projects.filter(p => !completedNums.has(p));

            // グループフィルター適用
            if (currentProjectGroupFilter === '2000') {
                projects = projects.filter(p => /^2/.test(p));
            } else if (currentProjectGroupFilter === 'other') {
                projects = projects.filter(p => !/^2/.test(p));
            }
            listEl.innerHTML = "";
            let tooltip = document.getElementById('custom_project_tooltip') || document.createElement('div');
            tooltip.id = 'custom_project_tooltip'; tooltip.className = 'custom-tooltip'; document.body.appendChild(tooltip);
            projects.forEach(p => {
                const item = document.createElement('div');
                item.className = `project-item ${currentFilter === p ? 'active' : ''}`;
                item.innerText = p;
                const info = projectInfoMap[p];
                if (info.customer || info.details) {
                    item.onmouseenter = (e) => {
                        tooltip.innerText = `${info.customer}\n${info.details}`.trim();
                        tooltip.style.display = 'block';
                        
                        // ボタンの位置を取得
                        const rect = item.getBoundingClientRect();
                        let x = rect.right + 10; // ボタンの右側に10pxの隙間
                        let y = rect.top;        // 基本はボタンの上端に合わせる
                        
                        // 画面下端で見切れる場合の調整
                        const tooltipHeight = tooltip.offsetHeight;
                        const windowHeight = window.innerHeight;
                        
                        if (y + tooltipHeight > windowHeight) {
                            // 下に見切れる場合は、吹き出しの下端が画面下から10pxの位置に来るように上げる
                            y = windowHeight - tooltipHeight - 10;
                        }
                        
                        tooltip.style.left = x + 'px';
                        tooltip.style.top = y + 'px';
                    };
                    item.onmouseleave = () => tooltip.style.display = 'none';
                }
                item.onclick = () => filterByProject(p);
                listEl.appendChild(item);
            });
        }

        async function addProjectFromTemplate() {
            const projectNumber = document.getElementById('project_number').value.trim();
            const customerName = document.getElementById('customer_name_input').value.trim();
            const projectDetails = document.getElementById('project_details_input').value.trim();
            const orderDateValue = document.getElementById('order_date').value;
            const shippingDateValue = document.getElementById('shipping_date').value;

            if (!projectNumber) {
                alert("工事番号を入力してください");
                return;
            }

            // 工事番号からテンプレートテーブルを決定
            // 3T・4T始まり → task_template_b、3000・4000番台 → task_template_a、D番 → task_template_b、それ以外(2000番台) → task_template
            let templateTable;
            if (/^[34]T/i.test(projectNumber)) {
                templateTable = 'task_template_b';
            } else if (/^[34]/i.test(projectNumber)) {
                templateTable = 'task_template_a';
            } else if (/^D/i.test(projectNumber)) {
                templateTable = 'task_template_b';
            } else {
                templateTable = 'task_template';
            }

            // 1. テンプレートデータを取得（ID順にソート）
            const { data: templates, error: templateError } = await supabaseClient
                .from(templateTable)
                .select('*')
                .order('id', { ascending: true });

            if (templateError) {
                console.error("Template fetch error:", templateError);
                alert("テンプレートの取得に失敗しました");
                return;
            }

            if (!templates || templates.length === 0) {
                alert("テンプレートデータがありません");
                return;
            }

            // 2. 作成すべき見出し行（親タスク）のリストを定義
            // テンプレートの parent カラム、または text カラムからユニークな項目を抽出
            const parentItems = [];
            const seenNames = new Set();
            templates.forEach(temp => {
                const name = temp.parent || temp.text;
                if (name && !seenNames.has(name)) {
                    seenNames.add(name);
                    parentItems.push({
                        name: name,
                        relative_start: temp.relative_start_day || 0,
                        duration: temp.duration || 1,
                        reference_date: temp.reference_date || 'shipping',
                        major_item: temp.major_item || ''
                    });
                }
            });

            // 3. 新規タスクデータを作成（見出し行のみ）
            const newTasks = [];
            const orderDate = orderDateValue ? new Date(orderDateValue) : new Date();
            const shippingDate = shippingDateValue ? new Date(shippingDateValue) : null;

            parentItems.forEach(item => {
                let startDateStr;
                let duration = item.duration;

                if (item.name === "受注") {
                    // 受注はヘッダーの受注日をそのまま反映
                    startDateStr = orderDateValue || dateToDb(new Date());
                } else if (item.name === "出荷") {
                    // 出荷はヘッダーの出荷日をそのまま反映
                    startDateStr = shippingDateValue || dateToDb(new Date());
                } else if (item.reference_date === 'order') {
                    // 受注日基準（task_template_a / task_template_b の order 指定項目）
                    const calcDate = new Date(orderDate);
                    calcDate.setDate(calcDate.getDate() + item.relative_start);
                    startDateStr = dateToDb(calcDate);
                } else {
                    // 出荷日基準（デフォルト）
                    if (shippingDate) {
                        const calcDate = new Date(shippingDate);
                        calcDate.setDate(calcDate.getDate() + item.relative_start);
                        startDateStr = dateToDb(calcDate);
                    } else {
                        // 出荷日が未入力の場合は受注日を基準にする（フォールバック）
                        const calcDate = new Date(orderDate);
                        calcDate.setDate(calcDate.getDate() + Math.abs(item.relative_start));
                        startDateStr = dateToDb(calcDate);
                    }
                }

                // パターンA・B は子タスクとして作成（text=タスク名、parent=""）
                // 2000番台（task_template）は見出し行として作成（text=""、parent=見出し名）
                const isChildTaskPattern = (templateTable === 'task_template_a' || templateTable === 'task_template_b');
                newTasks.push({
                    project_number: projectNumber,
                    customer_name: customerName || "",
                    project_details: projectDetails || "",
                    text: isChildTaskPattern ? item.name : "",
                    parent: isChildTaskPattern ? "" : item.name,
                    major_item: item.major_item || null,
                    start_date: startDateStr,
                    duration: duration,
                    owner: "",
                    machine: "",
                    unit: ""
                });
            });

            // 4. Supabaseに一括挿入
            const { error: insertError } = await supabaseClient
                .from('tasks')
                .insert(newTasks);

            if (insertError) {
                console.error("Insert error:", insertError);
                alert("プロジェクトの作成に失敗しました");
            } else {
                alert(`工事番号 ${projectNumber} を作成しました`);
                // フォームをリセット・非表示
                document.getElementById('project_number').value = '';
                document.getElementById('customer_name_input').value = '';
                document.getElementById('project_details_input').value = '';
                document.getElementById('order_date').value = '';
                document.getElementById('shipping_date').value = '';
                document.getElementById('new-project-form').style.display = 'none';
                // 画面更新
                fetchTasks();
            }
        }

        // ===== グリッド インライン編集 =====
        (function() {
            let _ie = { taskId: null, field: null };

            // ポップアップを取得（初回のみ作成）
            function getPopup() {
