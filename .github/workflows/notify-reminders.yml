name: リマインダー通知

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'テストモード（黒崎のみ送信・デフォルトON）'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      test_project:
        description: '申請催促テスト用工事番号（テストモード時のみ有効・空欄で全件）'
        required: false
        default: ''
        type: string

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: パッケージインストール
        run: npm install
      - name: リマインダー通知を送信
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          TEST_PROJECT: ${{ github.event.inputs.test_project || '' }}
        run: node scripts/notify-reminders.js
